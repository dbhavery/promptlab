name: greeting-quality
model: ollama/qwen3:8b
prompt: |
  You are a helpful assistant. Greet the user warmly.
tests:
  - input: "Hello"
    assertions:
      - type: contains
        value: "hello"
        case_insensitive: true
      - type: max_tokens
        value: 100
  - input: "My name is Alice"
    assertions:
      - type: contains
        value: "Alice"
      - type: not_contains
        value: "I don't know"
